id: aws-ecs-terraform
name: AWS ECS Terraform
description: Production-ready Terraform scaffold for an AWS compute service with GitHub Actions CI/CD
cloud: aws
service_type: ecs
ci: github_actions

files:
  terraform/main.tf: |
    Generate a complete Terraform main.tf for the service type specified in the parsed intent.
    - Configure the terraform block with required_version and S3 backend using the org's backend config
    - Configure the AWS provider with default_tags applying all required_tags plus Environment and Service
    - Implement the service using the appropriate module from the org's module catalog if one exists,
      otherwise use the best public registry module for the requested service type
    - Pass vpc_id and subnet_ids as variables where relevant to the service type
    - Apply all security standards from the org config
    - Use resource naming conventions from org config

  terraform/variables.tf: |
    Generate variables.tf declaring all variables referenced in main.tf.
    Include aws_region, environment, service_name, and any service-specific variables.
    Include descriptions and types for every variable.

  terraform/outputs.tf: |
    Generate outputs.tf with the most useful outputs for the service type being deployed.

  terraform/environments/dev.tfvars: |
    Generate dev.tfvars populating all variables for the dev environment using
    the org's environment config. Leave missing values as commented TODO placeholders.

  terraform/environments/prod.tfvars: |
    Generate prod.tfvars populating all variables for the prod environment.
    Same approach as dev.tfvars.

  .github/workflows/deploy.yml: |
    Generate a GitHub Actions workflow that:
    - Triggers on push to main (apply) and pull_request to main (plan only)
    - Uses OIDC authentication with aws-actions/configure-aws-credentials@v4
    - Uses the OIDC role ARN from the org's environment config per environment
    - Sets TF_VERSION from the org's terraform_version
    - Runs: checkout, configure-aws-credentials, setup-terraform, init, plan, apply
    - Uses the correct tfvars file per environment
    - Adds a PR comment with the plan output

  .gitignore: |
    Generate a .gitignore for a Terraform repository.
    Include: .terraform/, *.tfstate, *.tfstate.backup, .terraform.lock.hcl,
    *.tfvars.json (but NOT *.tfvars), .env, crash.log, override.tf

  README.md: |
    Generate a README.md documenting the service name, what it provisions,
    the environments configured, getting started steps, and a local plan/apply guide.
