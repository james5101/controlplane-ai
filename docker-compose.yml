services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: controlplane
      POSTGRES_USER: controlplane
      POSTGRES_PASSWORD: controlplane
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./api/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U controlplane -d controlplane"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_ORG_LOGIN=${GITHUB_ORG_LOGIN}
      - DATABASE_URL=postgresql://controlplane:controlplane@db:5432/controlplane
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn api.main:app --reload --host 0.0.0.0 --port 8000

  web:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./web:/app
    command: sh -c "npm install && npm run dev"

volumes:
  postgres_data:
